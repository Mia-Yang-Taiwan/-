// ── 雲端 API 封裝 (改為安全 SDK 寫法) ───────────────────────────────────────────
async function sbGet(key) {
  try {
    const { data, error } = await supabase.from(TABLE).select("value").eq("key", key).maybeSingle();
    if (error || !data) return null;
    return data.value;
  } catch { return null; }
}

async function sbSet(key, value) {
  try {
    const { error } = await supabase.from(TABLE).upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
    return !error;
  } catch { return false; }
}

function copyTextToClipboard(text) {
  const ta = document.createElement("textarea"); ta.value = text;
  ta.setAttribute("readonly", ""); ta.style.position = "fixed"; ta.style.top = "-1000px";
  document.body.appendChild(ta); ta.focus(); ta.select();
  let ok = false; try { ok = document.execCommand("copy"); } catch {}
  document.body.removeChild(ta);
  return ok;
}

// ── 元件：彈出視窗 ──
function Modal({ title, onClose, children }) {
  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"flex-end" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.surface, borderRadius:"20px 20px 0 0", width:"100%", maxWidth:480, margin:"0 auto", padding:"20px 20px 36px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
          <span style={{尊稱 fontWeight:700, fontSize:17, color:C.text }}>{title}</span>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, color:C.sub, cursor:"pointer" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── 元件：提示 ──
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, [msg]);
  return (
    <div style={{ position:"fixed", bottom:90, left:"50%", transform:"translateX(-50%)", background:C.text, color:"#fff", padding:"10px 22px", borderRadius:24, fontSize:14, fontWeight:600, zIndex:300, boxShadow:"0 4px 16px rgba(0,0,0,0.2)" }}>{msg}</div>
  );
}

// ── 主應用 ──
function App() {
  // ── 🔒 AUTH 新增狀態 ──
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null); // 存角色與真實姓名
  const [authLoading, setAuthLoading] = useState(true);
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPassword, setLoginPassword] = useState("");
  const [isForgotMode, setIsForgotMode] = useState(false);
  const [showAddUser, setShowAddUser] = useState(false);
  const [newUserForm, setNewUserForm] = useState({ email: "", password: "", fullName: "", role: "member" });

  // ── 📦 原本擁有的所有核心狀態（原封不動） ──
  const [products, setProducts] = useState([]);
  const [zones,    setZones]    = useState([]);
  const [orders,   setOrders]   = useState([]);
  const [qty,      setQty]      = useState({});
  const [search,   setSearch]   = useState("");
  const [tab,      setTab]      = useState("order");
  const [toast,    setToast]    = useState("");

  const [syncStatus, setSyncStatus] = useState("offline");
  const [isLoading,  setIsLoading]  = useState(false);

  const [manageView,  setManageView]  = useState("zones");
  const [activeZone,  setActiveZone]  = useState(null);
  const [longPressId, setLongPressId] = useState(null);
  const longPressTimer = useRef(null);

  // 各種彈窗狀態（原封不動）
  const [showExport, setShowExport] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [deleteItem, setDeleteItem] = useState(null);
  const [showOrderDetail, setShowOrderDetail] = useState(null);
  const [showAddZone, setShowAddZone] = useState(false);
  const [deleteZone, setDeleteZone] = useState(null);
  const [editZone, setEditZone] = useState(null);
  const [orderToDelete, setOrderToDelete] = useState(null);
  const [orderToEdit, setOrderToEdit] = useState(null);
  const [editingOrderItems, setEditingOrderItems] = useState([]);

  const [form, setForm] = useState({ name:"", unit:"", note:"", zone:"A" });
  const [zoneForm, setZoneForm] = useState({ name:"" });

  const dragItem = useRef(null);
  const dragOverItem = useRef(null);

  // ── 🔒 AUTH 狀態監聽與登入控制 ──
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      checkProfile(session);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      checkProfile(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  async function checkProfile(session) {
    if (session?.user) {
      setUser(session.user);
      const { data, error } = await supabase.from("profiles").select("full_name, role").eq("id", session.user.id).maybeSingle();
      if (!error && data) {
        setProfile(data);
        // 登入驗證成功才抓取原本的雲端資料
        fetchCloudData();
      } else {
        await supabase.auth.signOut();
        alert("無系統存取權限，請聯絡管理員設定個人檔案。");
      }
    } else {
      setUser(null);
      setProfile(null);
    }
    setAuthLoading(false);
  }

  async function handleLoginSubmit(e) {
    e.preventDefault();
    if (!loginEmail || !loginPassword) return;
    setAuthLoading(true);
    const { error } = await supabase.signInWithPassword({ email: loginEmail, password: loginPassword });
    if (error) { alert("登入失敗: " + error.message); setAuthLoading(false); }
  }

  async function handleResetPassword(e) {
    e.preventDefault();
    if (!loginEmail) { alert("請輸入信箱"); return; }
    const { error } = await supabase.auth.resetPasswordForEmail(loginEmail, { redirectTo: window.location.href });
    if (error) alert("重設發送失敗: " + error.message);
    else { alert("密碼重設信已寄出，請查收信箱！"); setIsForgotMode(false); }
  }

  async function handleLogout() {
    await supabase.auth.signOut();
    setTab("order");
  }

  // ── 🔒 管理員專屬：新增帳號功能 ──
  async function handleCreateUserSubmit(e) {
    e.preventDefault();
    if (!newUserForm.email || !newUserForm.password || !newUserForm.fullName) { setToast("請填寫完整資訊"); return; }
    setToast("建立新帳號中...");
    const { error } = await supabase.auth.signUp({
      email: newUserForm.email,
      password: newUserForm.password,
      options: { data: { full_name: newUserForm.fullName, role: newUserForm.role } }
    });
    if (error) alert("新增失敗：" + error.message);
    else { setToast("成員新增成功！"); setShowAddUser(false); setNewUserForm({ email:"", password:"", fullName:"", role:"member" }); }
  }

  // ── 捷徑變數：是否為管理員 ──
  const isAdmin = profile?.role === "admin";

  // ── 原本的雲端載入邏輯（原封不動） ──
  async function fetchCloudData() {
    setIsLoading(true); setSyncStatus("syncing");
    try {
      const [cp, cz, co] = await Promise.all([sbGet(SK_PRODUCTS), sbGet(SK_ZONES), sbGet(SK_ORDERS)]);
      setProducts(cp || localLoad(SK_PRODUCTS, DEFAULT_PRODUCTS));
      setZones(cz || localLoad(SK_ZONES, DEFAULT_ZONES));
      setOrders(co || localLoad(SK_ORDERS, []));
      setSyncStatus("synced");
    } catch { setSyncStatus("error"); }
    finally { setIsLoading(false); }
  }

  // ── 原本的防延遲防衝突同步核心（原封不動） ──
  const syncTimeouts = useRef({});
  function debouncedSync(key, value) {
    localSave(key, value);
    clearTimeout(syncTimeouts.current[key]);
    setSyncStatus("syncing");
    syncTimeouts.current[key] = setTimeout(async () => {
      const ok = await sbSet(key, value);
      setSyncStatus(ok ? "synced" : "error");
    }, 500);
  }

  function updateProducts(u) { setProducts(p => { const n = typeof u === "function" ? u(p) : u; debouncedSync(SK_PRODUCTS, n); return n; }); }
  function updateZones(u)    { setZones(p => { const n = typeof u === "function" ? u(p) : u; debouncedSync(SK_ZONES, n); return n; }); }
  function updateOrders(u)   { setOrders(p => { const n = typeof u === "function" ? u(p) : u; debouncedSync(SK_ORDERS, n); return n; }); }

  // ── 原本的所有業務邏輯計算（原封不動） ──
  const orderedProducts = useMemo(() => {
    const zoneOrder = zones.map(z => z.id);
    return [...products].sort((a, b) => {
      const za = zoneOrder.indexOf(a.zone); const zb = zoneOrder.indexOf(b.zone);
      if (za !== zb) return za - zb;
      return (a.order || 0) - (b.order || 0);
    });
  }, [products, zones]);

  const filteredProducts = useMemo(() => orderedProducts.filter(p => p.name.includes(search)), [orderedProducts, search]);
  const selectedItems = useMemo(() => orderedProducts.filter(p => qty[p.id] > 0).map(p => ({ ...p, qty: qty[p.id] })), [orderedProducts, qty]);
  const exportText = useMemo(() => "內湖叫貨\n" + selectedItems.map(i => `${i.name} * ${i.qty}${i.unit}`).join("\n"), [selectedItems]);
  const zoneProducts = useMemo(() => activeZone ? products.filter(p => p.zone === activeZone).sort((a, b) => (a.order || 0) - (b.order || 0)) : [], [products, activeZone]);

  // ── 原本的所有操作事件（原封不動） ──
  function handleSubmitOrder() {
    if (selectedItems.length === 0) { setToast("請先選擇品項數量"); return; }
    const now = new Date(); const monthLabel = `${now.getMonth() + 1}月`;
    const sameMonth = orders.filter(o => o.monthLabel === monthLabel);
    const id = sameMonth.length === 0 ? `${monthLabel}叫貨` : `${monthLabel}追加`;
    const order = { id, monthLabel, time: now.toLocaleString("zh-TW", { hour12: false }), items: selectedItems.map(i => ({ name: i.name, qty: i.qty, unit: i.unit })) };
    updateOrders(prev => [order, ...prev]); setQty({}); setShowExport(false); setToast("叫貨單已儲存並同步！");
  }

  function handleOpenEditOrder(o) { setOrderToEdit(o); setEditingOrderItems(JSON.parse(JSON.stringify(o.items))); }
  function handleSaveEditOrder() {
    const finalItems = editingOrderItems.filter(item => item.qty > 0);
    if (finalItems.length === 0) { setToast("項目不可全部為0"); return; }
    updateOrders(prev => prev.map(o => (o.id === orderToEdit.id && o.time === orderToEdit.time) ? { ...o, items: finalItems } : o));
    setOrderToEdit(null); setToast("訂單內容已更新！");
  }
  function handleDeleteOrder() {
    updateOrders(prev => prev.filter(o => !(o.id === orderToDelete.id && o.time === orderToDelete.time)));
    if (showOrderDetail === (orderToDelete.id + orderToDelete.time)) setShowOrderDetail(null);
    setOrderToDelete(null); setToast("訂單已刪除！");
  }

  function openAdd() { setForm({ name:"", unit:"", note:"", zone: activeZone || zones[0]?.id || "A" }); setShowAdd(true); }
  function saveAdd() {
    if (!form.name.trim()) return;
    const maxOrder = products.filter(p => p.zone === form.zone).reduce((m, p) => Math.max(m, p.order || 0), 0);
    updateProducts(prev => [...prev, { id: Date.now(), name: form.name.trim(), unit: form.unit.trim(), note: form.note.trim(), zone: form.zone, order: maxOrder + 1 }]);
    setShowAdd(false); setToast("品項已新增！");
  }
  function openEdit(p) { setForm({ name: p.name, unit: p.unit, note: p.note, zone: p.zone }); setEditItem(p); }
  function saveEdit() {
    updateProducts(prev => prev.map(p => p.id === editItem.id ? { ...p, name: form.name.trim(), unit: form.unit.trim(), note: form.note.trim(), zone: form.zone } : p));
    setEditItem(null); setToast("已更新！");
  }
  function confirmDelete() {
    updateProducts(prev => prev.filter(p => p.id !== deleteItem.id));
    setQty(prev => { const n = { ...prev }; delete n[deleteItem.id]; return n; });
    setDeleteItem(null); setToast("已刪除！");
  }

  // ── 原本的所有拖曳排序邏輯（原封不動） ──
  function handleDragStart(e, index) { dragItem.current = index; e.currentTarget.style.opacity = '0.4'; }
  function handleDragEnd(e) { e.currentTarget.style.opacity = '1'; document.querySelectorAll('.drag-item').forEach(el => el.classList.remove('drag-over')); }
  function handleDragOver(e, index) { e.preventDefault(); dragOverItem.current = index; e.currentTarget.classList.add('drag-over'); }
  function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function handleDrop(e) {
    e.preventDefault(); if (dragItem.current === null || dragOverItem.current === null || dragItem.current === dragOverItem.current) return;
    const zProds = [...zoneProducts]; const dragged = zProds[dragItem.current]; zProds.splice(dragItem.current, 1); zProds.splice(dragOverItem.current, 0, dragged);
    const updatedZProds = zProds.map((p, i) => ({ ...p, order: i + 1 }));
    updateProducts(prev => prev.map(p => { const u = updatedZProds.find(x => x.id === p.id); return u ? u : p; }));
    dragItem.current = null; dragOverItem.current = null;
  }
  function moveItem(id, dir) {
    const zProds = [...zoneProducts]; const idx = zProds.findIndex(p => p.id === id); if (idx < 0) return;
    const swapIdx = idx + dir; if (swapIdx < 0 || swapIdx >= zProds.length) return;
    const newOrder = zProds[idx].order; const swapOrder = zProds[swapIdx].order;
    updateProducts(prev => prev.map(p => {
      if (p.id === zProds[idx].id) return { ...p, order: swapOrder }; if (p.id === zProds[swapIdx].id) return { ...p, order: newOrder }; return p;
    }));
  }

  function saveAddZone() {
    if (!zoneForm.name.trim()) return;
    updateZones(prev => [...prev, { id: Date.now().toString(36).toUpperCase().slice(-3), name: zoneForm.name.trim() }]);

          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} placeholder="品名" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} placeholder="單位 (如: 箱、包)" value={form.unit} onChange={e => setForm(f => ({ ...f, unit: e.target.value }))} />
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} placeholder="備註" value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} />
            <button onClick={saveAdd} style={{ background:C.primary, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>確認新增</button>
          </div>
        </Modal>
      )}

      {editItem && (
        <Modal title="編輯品項" onClose={() => setEditItem(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} value={form.unit} onChange={e => setForm(f => ({ ...f, unit: e.target.value }))} />
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} />
            <button onClick={saveEdit} style={{ background:C.primary, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>儲存修改</button>
          </div>
        </Modal>
      )}

      {deleteItem && (
        <Modal title="確認刪除" onClose={() => setDeleteItem(null)}>
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <p style={{ marginBottom:20 }}>確定要刪除「{deleteItem.name}」？</p>
            <button onClick={confirmDelete} style={{ background:C.danger, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>確認刪除</button>
          </div>
        </Modal>
      )}

      {showAddZone && (
        <Modal title="新增區域" onClose={() => setShowAddZone(false)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} placeholder="區域名稱 (如: F 區)" value={zoneForm.name} onChange={e => setZoneForm({ name: e.target.value })} />
            <button onClick={saveAddZone} style={{ background:C.primary, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>確認新增</button>
          </div>
        </Modal>
      )}

      {editZone && (
        <Modal title="編輯區域" onClose={() => setEditZone(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <input style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, color: C.text, background: C.bg, outline: "none" }} value={zoneForm.name} onChange={e => setZoneForm({ name: e.target.value })} />
            <button onClick={saveEditZone} style={{ background:C.primary, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>儲存修改</button>
          </div>
        </Modal>
      )}

      {deleteZone && (
        <Modal title="確認刪除區域" onClose={() => setDeleteZone(null)}>
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <p style={{ marginBottom:20, color:C.text }}>確定要刪除「{deleteZone.name}」？此區域內的所有品項將會被移動到其它可用區域中。</p>
            <button onClick={confirmDeleteZone} style={{ background:C.danger, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>確認刪除</button>
          </div>
        </Modal>
      )}

      {orderToEdit && (
        <Modal title={`修改訂單內容 (${orderToEdit.id})`} onClose={() => setOrderToEdit(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: "40vh", overflowY: "auto", padding: "4px 2px", marginBottom: 14 }}>
            {editingOrderItems.map((item, idx) => (
              <div key={idx} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.bg, padding: 10, borderRadius: 10 }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{item.name}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <select value={item.qty} onChange={(e) => { const v = Number(e.target.value); setEditingOrderItems(prev => prev.map((x, i) => i === idx ? { ...x, qty: v } : x)); }}
                    style={{ background: C.light, border: "none", borderRadius: 8, padding: "5px 10px", fontSize: 14, fontWeight: 700 }}>
                    {QTY_OPTIONS.map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                  <span style={{ fontSize: 13, color: C.sub }}>{item.unit}</span>
                </div>
              </div>
            ))}
          </div>
          <button onClick={handleSaveEditOrder} style={{ background: C.primary, color: "#fff", border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>
            儲存修改
          </button>
          <button onClick={() => setOrderToEdit(null)} style={{ width:"100%", marginTop:8, background:"none", border:"none", color:C.sub, fontSize:14, cursor:"pointer", padding:"8px", fontFamily:"inherit" }}>
            取消
          </button>
        </Modal>
      )}

      {orderToDelete && (
        <Modal title="刪除訂單" onClose={() => setOrderToDelete(null)}>
          <div style={{ textAlign:"center", padding: "8px 0 16px" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>🗑️</div>
            <div style={{ fontSize:16, color:C.text, marginBottom:6 }}>確定要刪除訂單</div>
            <div style={{ fontSize:18, fontWeight:700, color:C.danger, marginBottom:20 }}>「{orderToDelete.id}」？</div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setOrderToDelete(null)} style={{ flex:1, background:C.light, border:"none", borderRadius:10, padding:"13px", fontSize:15, cursor:"pointer", fontFamily:"inherit", color:C.text, fontWeight:600 }}>取消</button>
              <button onClick={handleDeleteOrder} style={{ flex:1, background:C.danger, border:"none", borderRadius:10, padding:"13px", fontSize:15, cursor:"pointer", fontFamily:"inherit", color:"#fff", fontWeight:700 }}>刪除</button>
            </div>
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onDone={() => setToast("")} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
