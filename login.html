<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>錦禾叫貨系統 - 登入</title>
  <style>
    body { background: #f3ebe2; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: #e8e0d6; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; maxWidth: 360px; text-align: center; }
    h2 { color: #7c512e; margin-bottom: 24px; }
    input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1.5px solid #c4b8aa; border-radius: 8px; box-sizing: border-box; background: #f3ebe2; outline: none; }
    button { width: 100%; padding: 12px; background: #7c512e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:hover { background: #9a6b3a; }
    .forgot-link { margin-top: 14px; display: block; color: #6b5740; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>錦禾叫貨系統</h2>
    <input type="email" id="email" placeholder="請輸入電子信箱 (Email)" />
    <input type="password" id="password" placeholder="請輸入密碼" />
    <button onclick="handleLogin()">登入</button>
    <a href="#" class="forgot-link" onclick="handleResetPassword()">忘記密碼？點此重設</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 這裡直接使用你專案原有的網址與密鑰
    const SUPABASE_URL = "https://hbtmjkhwhfzrgbniwjii.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhidG1qa2h3aGZ6cmdibml3amlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzg3NjUsImV4cCI6MjA5NzIxNDc2NX0.FpGs-EBTmA-pE9At3PPkDMsk6n82d6d7nMda68WpHjw";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 處理登入
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return alert('請填寫完整帳號密碼');

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) {
        alert('登入失敗：' + error.message);
      } else {
        // 登入成功，導向主頁面
        window.location.href = "index.html";
      }
    }

    // 處理忘記密碼（重設密碼發信）
    async function handleResetPassword() {
      const email = document.getElementById('email').value.trim();
      if (!email) return alert('請先在輸入框填寫您的 Email，再點擊重設密碼');
      
      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/index.html?type=recovery',
      });
      
      if (error) alert('發送失敗：' + error.message);
      else alert('重設密碼信件已寄出！請至信箱收信。');
    }
    
    // 檢查目前是否已經是登入狀態，若已登入直接跳轉主頁
    _supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "index.html";
    });
  </script>
</body>
</html>
